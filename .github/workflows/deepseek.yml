name: Koi-Talent AI (DeepSeek)
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request_review:
    types: [submitted]

jobs:
  deepseek:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Run DeepSeek
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          # ── Extract the prompt from the trigger event ──
          if [ "${{ github.event_name }}" = "issues" ]; then
            PROMPT="${{ github.event.issue.title }}

          ${{ github.event.issue.body }}"
            COMMENT_URL="${{ github.event.issue.comments_url }}"
          elif [ "${{ github.event_name }}" = "issue_comment" ]; then
            PROMPT="${{ github.event.comment.body }}"
            COMMENT_URL="${{ github.event.issue.comments_url }}"
          elif [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
            PROMPT="${{ github.event.comment.body }}"
            COMMENT_URL="${{ github.event.pull_request.comments_url }}"
          elif [ "${{ github.event_name }}" = "pull_request_review" ]; then
            PROMPT="${{ github.event.review.body }}"
            COMMENT_URL="${{ github.event.pull_request.comments_url }}"
          fi

          # Strip @claude from prompt
          PROMPT=$(echo "$PROMPT" | sed 's/@claude//g')

          # ── Build system prompt ──
          SYSTEM="You are Koi-Talent AI, a coding assistant for a talent management agency. You help with code, automation, integrations, and infrastructure. Be concise and direct. Respond in GitHub-flavored Markdown."

          # ── Call DeepSeek API ──
          RESPONSE=$(curl -s https://api.deepseek.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $DEEPSEEK_API_KEY" \
            -d "$(jq -nc --arg system "$SYSTEM" --arg prompt "$PROMPT" '{
              model: "deepseek-chat",
              messages: [
                {role: "system", content: $system},
                {role: "user", content: $prompt}
              ],
              max_tokens: 4096,
              temperature: 0.7
            }')")

          BODY=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Error: \(.error.message // "unknown")"')

          # ── Post response as a comment ──
          ESCAPED=$(echo "$BODY" | jq -Rs .)
          curl -s -X POST "$COMMENT_URL" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"body\": $ESCAPED}"
